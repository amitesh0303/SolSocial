version: "3.9"
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: solsocial
      POSTGRES_PASSWORD: solsocial
      POSTGRES_DB: solsocial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://solsocial:solsocial@postgres:5432/solsocial
      REDIS_URL: redis://redis:6379
      PORT: 3001
      WS_PORT: 3002
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
